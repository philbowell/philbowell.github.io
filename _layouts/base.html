<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title and page.title != "Home" %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  {% include nav.html %}
  <main>
    {{ content }}
  </main>
  {% include footer.html %}
  <script>
    (() => {
      const nav = document.querySelector('.site-nav');
      const navToggle = document.querySelector('.nav-toggle');

      if (nav && navToggle) {
        nav.dataset.menuEnhanced = 'true';

        navToggle.addEventListener('click', () => {
          const isOpen = nav.dataset.menuOpen === 'true';

          nav.dataset.menuOpen = String(!isOpen);
          navToggle.setAttribute('aria-expanded', String(!isOpen));
        });

        nav.addEventListener('click', (event) => {
          if (event.target.closest('.site-menu a')) {
            nav.dataset.menuOpen = 'false';
            navToggle.setAttribute('aria-expanded', 'false');
          }
        });

        document.addEventListener('click', (event) => {
          if (!nav.contains(event.target)) {
            nav.dataset.menuOpen = 'false';
            navToggle.setAttribute('aria-expanded', 'false');
          }
        });

        document.addEventListener('keydown', (event) => {
          if (event.key === 'Escape') {
            nav.dataset.menuOpen = 'false';
            navToggle.setAttribute('aria-expanded', 'false');
          }
        });
      }
    })();
  </script>
</body>
</html>
